<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100" viewBox="0 0 400 100"><rect fill="#fff" width="400" height="100"/><text x="8" y="22" font-size="8.5" font-family="Segoe UI,sans-serif">La logistique optimise les flux de marchandises</text><text x="8" y="36" font-size="8.5">d'informations et</text><rect x="120" y="42" width="160" height="48" fill="#e5e7eb" stroke="#9ca3af"/><text x="8" y="58" font-size="8.5">de services. Elle englobe stocks,</text><text x="8" y="72" font-size="8.5">transport, distribution.</text></svg>