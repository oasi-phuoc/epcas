<svg xmlns="http://www.w3.org/2000/svg" width="400" height="110" viewBox="0 0 400 110"><rect fill="#fff" width="400" height="110"/><text x="8" y="18" font-size="8.5" font-family="Segoe UI,sans-serif">La logistique est l'art d'organiser, de gťrer et d'optimiser les flux</text><text x="8" y="30" font-size="8.5">de marchandises, d'informations et</text><rect x="248" y="22" width="72" height="52" fill="#e5e7eb" stroke="#111"/><text x="8" y="42" font-size="8.5">de services. Elle englobe la gestion</text><text x="8" y="54" font-size="8.5">des stocks, le transport, la distribution</text><text x="8" y="88" font-size="8.5">et la planification.</text></svg>