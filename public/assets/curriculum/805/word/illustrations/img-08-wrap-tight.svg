<svg xmlns="http://www.w3.org/2000/svg" width="400" height="110" viewBox="0 0 400 110"><rect fill="#fff" width="400" height="110"/><ellipse cx="300" cy="55" rx="48" ry="40" fill="#e5e7eb" stroke="#9ca3af"/><text x="8" y="20" font-size="8" font-family="Segoe UI,sans-serif">La logistique organise les flux de</text><text x="8" y="32" font-size="8">marchandises, d'informations et de</text><text x="8" y="44" font-size="8">services. Elle englobe stocks,</text><text x="220" y="44" font-size="8">transport,</text><text x="8" y="92" font-size="8">distribution et planification.</text></svg>